const esc = (s='') => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
function setBtnLoading(id, loading) {
  const b = document.getElementById(id); if (!b) return;
  b.classList.toggle('loading', loading); b.disabled = loading;
}

// Bridge: auth uses toast(), MyStudio uses notification system
function toast(msg, kind='') {
  const container = document.getElementById('notification-container');
  if (!container) return;
  const el = document.createElement('div');
  const cls = kind === 'ok' ? 'success' : kind === 'err' ? 'error' : '';
  el.className = 'notification' + (cls ? ' ' + cls : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.transition='opacity .25s'; el.style.opacity='0'; setTimeout(()=>el.remove(),250); }, 2800);
}

// ═══════════════════════════════════════════════════════
//  AUTHENTICATION SYSTEM
//  Client-side reference implementation. In production, password
//  hashing, session issuance, rate limiting, CSRF validation and
//  email/SMS delivery MUST be enforced server-side — this module
//  mirrors that logic locally (localStorage as a mock user table)
//  so the full UX can be demonstrated without a backend.
// ═══════════════════════════════════════════════════════
const AUTH = {
  page: 'login', pageOpts: {},
  pendingUserId: null, pendingEmail: '', pendingFlow: null, // 'register' | 'forgot'
  currentOtp: null, otpExpires: 0,
  captchaAnswer: null,
  resendSeconds: 0, resendTimerHandle: null,
  lockTimerHandle: null,
  idleWarnHandle: null, idleLogoutHandle: null, activityBound: false,
};
const SESSION_TIMEOUT_MS = 15 * 60 * 1000; // 15 min idle → warn
const SESSION_GRACE_MS = 60 * 1000;        // +60s grace → auto logout
const MAX_LOGIN_ATTEMPTS = 5;

/* ── CSRF token (mirrors what a server would issue per-session) ── */
function ensureCsrfToken() {
  let tok = sessionStorage.getItem('ff_csrf');
  if (!tok) { tok = uid() + uid(); sessionStorage.setItem('ff_csrf', tok); }
  document.getElementById('csrfMeta').setAttribute('content', tok);
  return tok;
}
function csrfHeader() { return { 'X-CSRF-Token': sessionStorage.getItem('ff_csrf') || '' }; }

/* ── Hashing (SHA-256 via Web Crypto, with a deterministic fallback) ── */
async function sha256Hex(str) {
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  } catch {
    let h = 0; for (let i=0;i<str.length;i++){ h = (Math.imul(31,h) + str.charCodeAt(i))|0; }
    return 'fb' + Math.abs(h).toString(16);
  }
}
async function hashPassword(password, salt) { return sha256Hex(salt + ':' + password); }
const genSalt = () => uid() + uid();

/* ── Mock user table ── */
function getUsers() { try { return JSON.parse(localStorage.getItem('ff_users')) || []; } catch { return []; } }
function saveUsers(list) { localStorage.setItem('ff_users', JSON.stringify(list)); }
function findUserByEmail(email) { return getUsers().find(u => u.email.toLowerCase() === String(email).toLowerCase()) || null; }
function findUserByUsername(username) { return getUsers().find(u => u.username.toLowerCase() === String(username).toLowerCase()) || null; }
function findUserById(id) { return getUsers().find(u => u.id === id) || null; }
function upsertUser(user) { const list = getUsers(); const i = list.findIndex(u => u.id === user.id); if (i>-1) list[i]=user; else list.push(user); saveUsers(list); }

/* ── Device fingerprint (coarse client signal — not a security boundary on its own) ── */
let _fpCache = null;
async function getDeviceFingerprint() {
  if (_fpCache) return _fpCache;
  const raw = [navigator.userAgent, navigator.language, screen.width+'x'+screen.height, Intl.DateTimeFormat().resolvedOptions().timeZone, navigator.hardwareConcurrency].join('|');
  _fpCache = (await sha256Hex(raw)).slice(0, 24);
  return _fpCache;
}
function deviceLabel() {
  const ua = navigator.userAgent;
  const os = /Windows/.test(ua) ? 'Windows' : /Mac/.test(ua) ? 'macOS' : /Android/.test(ua) ? 'Android' : /iPhone|iPad/.test(ua) ? 'iOS' : 'Linux';
  const browser = /Chrome/.test(ua) ? 'Chrome' : /Firefox/.test(ua) ? 'Firefox' : /Safari/.test(ua) ? 'Safari' : 'Browser';
  return `${browser} on ${os}`;
}

/* ── Rate limiting / brute-force protection (per identifier) ── */
function getRateLimits() { try { return JSON.parse(localStorage.getItem('ff_rate_limit')) || {}; } catch { return {}; } }
function saveRateLimits(obj) { localStorage.setItem('ff_rate_limit', JSON.stringify(obj)); }
function checkRateLimit(key) {
  const all = getRateLimits(); const rec = all[key];
  if (!rec) return { locked:false, remaining:0 };
  if (rec.lockUntil && Date.now() < rec.lockUntil) return { locked:true, remaining: Math.ceil((rec.lockUntil-Date.now())/1000) };
  return { locked:false, remaining:0, count: rec.count||0 };
}
function recordFailedAttempt(key) {
  const all = getRateLimits(); const rec = all[key] || { count:0, lockUntil:0 };
  rec.count += 1;
  if (rec.count >= MAX_LOGIN_ATTEMPTS) {
    const lockSeconds = Math.min(30 * Math.pow(2, rec.count - MAX_LOGIN_ATTEMPTS), 300);
    rec.lockUntil = Date.now() + lockSeconds*1000;
  }
  all[key] = rec; saveRateLimits(all);
  return checkRateLimit(key);
}
function clearRateLimit(key) { const all = getRateLimits(); delete all[key]; saveRateLimits(all); }

/* ── Validation ── */
const RE_EMAIL = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
const RE_USERNAME = /^[a-zA-Z0-9_]{3,20}$/;
function calcPwdStrength(pwd) {
  const checks = { len: pwd.length >= 8, upper: /[A-Z]/.test(pwd), lower: /[a-z]/.test(pwd), num: /[0-9]/.test(pwd), symbol: /[^A-Za-z0-9]/.test(pwd) };
  let score = Object.values(checks).filter(Boolean).length;
  score = pwd.length === 0 ? 0 : Math.max(1, Math.min(4, score - 1));
  return { score, checks, label: [ '', t('pwd_weak'), t('pwd_fair'), t('pwd_good'), t('pwd_strong') ][score] };
}

/* ── Captcha (lightweight math challenge — swap for hCaptcha/reCAPTCHA site key in production) ── */
function genCaptcha() {
  const a = 1 + Math.floor(Math.random()*9), b = 1 + Math.floor(Math.random()*9);
  AUTH.captchaAnswer = a + b;
  return { a, b };
}

}
function refreshCaptcha() {
  const { a, b } = genCaptcha();

/* ── OTP boxes (verify email / 2FA) ── */
function setupOtpBoxes(containerId) {
  const boxes = Array.from(document.querySelectorAll(`#${containerId} .otp-box`));
  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/[^0-9]/g,'').slice(0,1);
      box.classList.toggle('filled', !!box.value);
      if (box.value && boxes[i+1]) boxes[i+1].focus();
    });
    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !box.value && boxes[i-1]) boxes[i-1].focus();
    });
    box.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData.getData('text')||'').replace(/[^0-9]/g,'').slice(0,boxes.length);
      text.split('').forEach((ch, j) => { if (boxes[j]) { boxes[j].value = ch; boxes[j].classList.add('filled'); } });
      const next = boxes[Math.min(text.length, boxes.length-1)]; if (next) next.focus();
    });
  });
  if (boxes[0]) boxes[0].focus();
}
function getOtpValue(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} .otp-box`)).map(b => b.value).join('');
}

/* ── Resend cooldown (shared by forgot-password & verify-email) ── */
function startResendCooldown(seconds, linkId) {
  clearInterval(AUTH.resendTimerHandle);
  AUTH.resendSeconds = seconds;
  const el = document.getElementById(linkId);
  const tick = () => {
    if (!el) return;
    if (AUTH.resendSeconds <= 0) {
      el.textContent = t('auth_resend_now'); el.classList.remove('disabled');
      clearInterval(AUTH.resendTimerHandle);
    } else {
      el.textContent = t('auth_resend_in', AUTH.resendSeconds); el.classList.add('disabled');
      AUTH.resendSeconds--;
    }
  };
  tick();
  AUTH.resendTimerHandle = setInterval(tick, 1000);
}

function switchLoginTab(mode) { showAuthPage('login', { idMode: mode }); }
async function onLoginSubmit(e) {
  e.preventDefault();
  document.getElementById('loginIdErr').classList.remove('visible');
  document.getElementById('loginPwdErr').classList.remove('visible');
  document.getElementById('loginBanner').innerHTML = '';
  const mode = AUTH.pageOpts.idMode || 'email';
  const idVal = document.getElementById('loginIdentifier').value.trim();
  const pwd = document.getElementById('loginPassword').value;
  let bad = false;
  if (!idVal) { showFieldErr('loginIdErr', t('err_required')); bad = true; }
  else if (mode==='email' && !RE_EMAIL.test(idVal)) { showFieldErr('loginIdErr', t('err_email_invalid')); bad = true; }
  if (!pwd) { showFieldErr('loginPwdErr', t('err_required')); bad = true; }
  if (bad) return;

  const rl = checkRateLimit(idVal.toLowerCase());
  if (rl.locked) { renderAuthBanner('loginBanner', 'err', t('auth_locked_body', rl.remaining)); tickLockBanner('loginBanner', idVal.toLowerCase(), rl.remaining); return; }

  setBtnLoading('loginSubmitBtn', true);
  await sleep(550); // simulated network latency
  const user = mode==='email' ? findUserByEmail(idVal) : findUserByUsername(idVal);
  if (!user) {
    setBtnLoading('loginSubmitBtn', false);
    const r = recordFailedAttempt(idVal.toLowerCase());
    showFieldErr('loginPwdErr', t('err_login_invalid'));
    if (r.locked) { renderAuthBanner('loginBanner', 'err', t('auth_locked_body', r.remaining)); tickLockBanner('loginBanner', idVal.toLowerCase(), r.remaining); }
    return;
  }
  const candidateHash = await hashPassword(pwd, user.salt);
  if (candidateHash !== user.passwordHash) {
    setBtnLoading('loginSubmitBtn', false);
    const r = recordFailedAttempt(idVal.toLowerCase());
    showFieldErr('loginPwdErr', t('err_login_invalid'));
    if (r.locked) { renderAuthBanner('loginBanner', 'err', t('auth_locked_body', r.remaining)); tickLockBanner('loginBanner', idVal.toLowerCase(), r.remaining); }
    return;
  }
  clearRateLimit(idVal.toLowerCase());
  setBtnLoading('loginSubmitBtn', false);
  const remember = document.getElementById('loginRemember').checked;
  await routeAfterCredentialsOk(user, remember);
}
function showFieldErr(id, msg) { const el = document.getElementById(id); el.querySelector('span').textContent = msg; el.classList.add('visible'); document.getElementById(id.replace('Err','')).classList.add('has-error'); }
function renderAuthBanner(rootId, kind, msg) {
  const icons = { err:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>', warn:'<path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>', ok:'<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' };
  document.getElementById(rootId).innerHTML = `<div class="auth-banner ${kind}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${icons[kind]}</svg><span>${msg}</span></div>`;
}
function tickLockBanner(rootId, key, seconds) {
  clearInterval(AUTH.lockTimerHandle); let s = seconds;
  AUTH.lockTimerHandle = setInterval(() => {
    s--; if (s <= 0) { clearInterval(AUTH.lockTimerHandle); document.getElementById(rootId).innerHTML = ''; document.getElementById('loginSubmitBtn') && setBtnLoading('loginSubmitBtn', false); }
    else renderAuthBanner(rootId, 'err', t('auth_locked_body', s));
  }, 1000);
}


async function routeAfterCredentialsOk(user, remember) {
  const fp = await getDeviceFingerprint();
  const known = (user.trustedDevices||[]).includes(fp);
  if (!known) toast(t('auth_device_new'), 'warn'); else toast(t('auth_device_known'), 'ok');
  AUTH.pendingUserId = user.id;
  if (user.twoFAEnabled && !known) { issueOtp(); showAuthPage('twofa', { remember }); return; }
  if (!user.emailVerified) { AUTH.pendingEmail = user.email; issueOtp(); showAuthPage('verify', { remember, postLogin:true }); return; }
  await completeLogin(user, remember, fp, known);
}

async function onRegisterSubmit(e) {
  e.preventDefault();
  ['regFullnameErr','regUsernameErr','regEmailErr','regConfirmErr'].forEach(id => document.getElementById(id).classList.remove('visible'));
  const fullName = document.getElementById('regFullname').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pwd = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirmPassword').value;
  let bad = false;
  if (!fullName) { showFieldErr('regFullnameErr', t('err_required')); bad = true; }
  if (!RE_USERNAME.test(username)) { showFieldErr('regUsernameErr', t('err_username_invalid')); bad = true; }
  else if (findUserByUsername(username)) { showFieldErr('regUsernameErr', t('err_username_taken')); bad = true; }
  if (!RE_EMAIL.test(email)) { showFieldErr('regEmailErr', t('err_email_invalid')); bad = true; }
  else if (findUserByEmail(email)) { showFieldErr('regEmailErr', t('err_email_taken')); bad = true; }
  const strength = calcPwdStrength(pwd);
  if (!strength.checks.len) { showFieldErr('regConfirmErr', t('err_password_short')); bad = true; }
  if (pwd !== confirm) { showFieldErr('regConfirmErr', t('err_confirm_mismatch')); bad = true; }
  if (!verifyCaptchaInput()) bad = true;
  const termsEl = document.getElementById('regTerms');
  if (!termsEl.checked) { document.getElementById('regTermsErr').classList.add('visible'); bad = true; }
  if (bad) return;

  setBtnLoading('registerSubmitBtn', true);
  await sleep(600);
  const salt = genSalt();
  const passwordHash = await hashPassword(pwd, salt);
  const user = {
    id: uid(), fullName, username, email, salt, passwordHash, avatar: null,
    emailVerified: false, twoFAEnabled: false, trustedDevices: [],
    sessions: [], createdAt: Date.now(),
  };
  upsertUser(user);
  setBtnLoading('registerSubmitBtn', false);
  toast(t('toast_register_ok'), 'ok');
  AUTH.pendingUserId = user.id; AUTH.pendingEmail = email; AUTH.pendingFlow = 'register';
  issueOtp();
  showAuthPage('verify', { postLogin:true, remember:true });
}

  if (!verifyOtpCode(code)) { document.getElementById('resetOtpErr').classList.add('visible'); return; }
  const pwd = document.getElementById('resetPassword').value;
  const confirm = document.getElementById('resetConfirmPassword').value;
  const strength = calcPwdStrength(pwd);
  if (!strength.checks.len) { showFieldErr('resetConfirmErr', t('err_password_short')); return; }
  if (pwd !== confirm) { showFieldErr('resetConfirmErr', t('err_confirm_mismatch')); return; }
  setBtnLoading('resetSubmitBtn', true);
  await sleep(600);
  const user = findUserById(AUTH.pendingUserId);
  if (user) {
    user.salt = genSalt();
    user.passwordHash = await hashPassword(pwd, user.salt);
    upsertUser(user);
  }
  setBtnLoading('resetSubmitBtn', false);
  showAuthPage('reset-done');
}

function showAuthPage(page, opts = {}) {

  // Hide MyStudio app shell
  const appEl = document.getElementById('app');
  if (appEl) appEl.style.display = 'none';
  document.getElementById('authArt').innerHTML = authArtHTML(page);
  const build = AUTH_PAGES[page] || loginPageHTML;
  document.getElementById('authCard').innerHTML = build();
  if (page === 'verify') setupOtpBoxes('verifyOtp');

/* ── CURRENT-SESSION HELPERS ── */
function setCurrentUserId(id, remember) {
  if (remember) { localStorage.setItem('ff_current_user', id); sessionStorage.removeItem('ff_current_user'); }
  else { sessionStorage.setItem('ff_current_user', id); localStorage.removeItem('ff_current_user'); }
}
function getCurrentUserId() { return localStorage.getItem('ff_current_user') || sessionStorage.getItem('ff_current_user'); }
function getCurrentUser() { const id = getCurrentUserId(); return id ? findUserById(id) : null; }
function clearCurrentUserId() { localStorage.removeItem('ff_current_user'); sessionStorage.removeItem('ff_current_user'); }

function userInitials(user) {
  const src = (user.fullName || user.username || '?').trim();
  return src.split(/\s+/).slice(0,2).map(p => p[0]).join('').toUpperCase();
}
function avatarHTML(user) {
  return user.avatar ? `<img src="${user.avatar}" alt="">` : userInitials(user);
}

/* ── COMPLETE LOGIN: persist session, unlock the app shell ── */
async function completeLogin(user, remember, fp, known) {
  if (!user) { showAuthPage('login'); return; }
  if (!(user.trustedDevices||[]).includes(fp)) {
    user.trustedDevices = [...(user.trustedDevices||[]), fp];
  }
  user.lastLoginAt = Date.now();
  upsertUser(user);
  setCurrentUserId(user.id, remember);
  ensureCsrfToken();
  hideAuthPage();
  document.getElementById('userAvatarBtn').innerHTML = avatarHTML(user);
  // switchView not needed in MyStudio context
  // renderAll not needed in MyStudio context
  toast(`${t('auth_login_title')} — ${user.fullName || user.username}`, 'ok');
}

function logout() {
  clearCurrentUserId();
  closeUserMenu();
  toast(t('toast_logged_out'), 'ok');
  showAuthPage('login');
}

    </div>

    <div class="profile-card">
      <h3>${t('pc_sessions_title')}</h3>
      <div class="pc-sub">${t('pc_sessions_sub')}</div>
      <div class="session-item">
        <div class="session-icon">💻</div>
        <div class="session-info">
          <div class="session-device">${esc(deviceLabel())}</div>
          <div class="settings-row-sub">${t('session_current')}</div>
        </div>
      </div>
      ${otherSessions > 1 ? `<button class="avatar-btn ghost" style="margin-top:10px" onclick="revokeOtherSessions()">${t('btn_revoke_all')}</button>` : ''}
    </div>

    <div class="profile-card">
      <h3>${t('pc_danger_title')}</h3>
      <div class="pc-sub">${t('pc_danger_sub')}</div>
      <button class="avatar-btn ghost" onclick="deleteAccount()">${t('btn_delete_account')}</button>
    </div>
  </div>`;
}

async function onAvatarFileChosen(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const user = getCurrentUser(); if (!user) return;
    user.avatar = reader.result; upsertUser(user);
    document.getElementById('profileAvatarBig').innerHTML = avatarHTML(user);
    document.getElementById('userAvatarBtn').innerHTML = avatarHTML(user);
    toast(t('toast_avatar_saved'), 'ok');
    renderProfilePage();
  };
  reader.readAsDataURL(file);
}
function removeAvatar() {
  const user = getCurrentUser(); if (!user) return;
  user.avatar = null; upsertUser(user);
  toast(t('toast_avatar_saved'), 'ok');
  renderProfilePage();
  document.getElementById('userAvatarBtn').innerHTML = avatarHTML(user);
}
function onProfileInfoSubmit(e) {
  e.preventDefault();
  const user = getCurrentUser(); if (!user) return;
  user.fullName = document.getElementById('pFullname').value.trim();
  user.username = document.getElementById('pUsername').value.trim();
  user.email = document.getElementById('pEmail').value.trim();
  upsertUser(user);
  toast(t('toast_profile_saved'), 'ok');
  document.getElementById('userAvatarBtn').innerHTML = avatarHTML(user);
}
async function onChangePasswordSubmit(e) {
  e.preventDefault();
  document.getElementById('pCurPwdErr').classList.remove('visible');
  const user = getCurrentUser(); if (!user) return;
  const curPwd = document.getElementById('pCurPwd').value;
  const newPwd = document.getElementById('pNewPwd').value;
  const curHash = await hashPassword(curPwd, user.salt);
  if (curHash !== user.passwordHash) { document.getElementById('pCurPwdErr').classList.add('visible'); return; }
  user.salt = genSalt();
  user.passwordHash = await hashPassword(newPwd, user.salt);
  upsertUser(user);
  toast(t('toast_pwd_changed'), 'ok');
  renderProfilePage();
}
function revokeOtherSessions() {
  const user = getCurrentUser(); if (!user) return;
  getDeviceFingerprint().then(fp => { user.trustedDevices = [fp]; upsertUser(user); });
  toast(t('toast_session_revoked'), 'ok');
  renderProfilePage();
}
function deleteAccount() {
  if (!confirm(t('confirm_delete_account'))) return;
  const user = getCurrentUser(); if (!user) return;
  saveUsers(getUsers().filter(u => u.id !== user.id));
  clearCurrentUserId();
  toast(t('toast_account_deleted'), 'ok');
  showAuthPage('login');
}


// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
// ── Auth Bootstrap ──
document.addEventListener('DOMContentLoaded', async function() {
  // Sync theme with MyStudio
  const isDark = document.body.classList.contains('theme-dark');
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');

  // Small delay to let App.init() finish
  await sleep(60);

  const user = getCurrentUser();
  const avatarBtn = document.getElementById('userAvatarBtn');
  if (!user) {
    showAuthPage('login');
  } else {
    if (avatarBtn) avatarBtn.innerHTML = avatarHTML(user);
  }
});

// ── Profile link in user dropdown ──
// Patch toggleUserMenu to open profile via _mystudio_open_profile
const _origToggleUserMenu = toggleUserMenu;

</script>
