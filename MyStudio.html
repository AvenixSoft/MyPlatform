<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="csrf-token" id="csrfMeta" content="">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="MyPanel Logo.png" type="image/png">
<title>MyStudio</title>
<style>
  /* ===== VARIABLES ===== */
:root {
  --bg-primary: #1e1e2e;
  --bg-secondary: #252535;
  --bg-tertiary: #2d2d40;
  --bg-elevated: #313145;
  --border-color: #3a3a50;
  --text-primary: #e4e4f0;
  --text-secondary: #9a9ab0;
  --text-muted: #6b6b85;
  --accent-blue: #4d9fff;
  --accent-blue-dim: rgba(77,159,255,0.15);
  --accent-orange: #ff9d4d;
  --accent-orange-dim: rgba(255,157,77,0.15);
  --danger: #ff5c5c;
  --success: #4dff9d;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 6px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.45);
  --transition-fast: 0.15s ease;
  --transition-mid: 0.25s cubic-bezier(0.4,0,0.2,1);
  --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-code: 'Fira Code', 'Cascadia Code', Consolas, monospace;
  --topbar-h: 48px;
  --statusbar-h: 26px;
  --activitybar-w: 48px;
  --sidebar-w: 240px;
  --console-h: 180px;
}

body.theme-light {
  --bg-primary: #f5f5fa;
  --bg-secondary: #ffffff;
  --bg-tertiary: #ececf5;
  --bg-elevated: #ffffff;
  --border-color: #d8d8e8;
  --text-primary: #1e1e2e;
  --text-secondary: #4a4a60;
  --text-muted: #8a8aa0;
}

/* ===== RESET ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-ui);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 13px;
  transition: background var(--transition-mid), color var(--transition-mid);
}
button {
  border: none;
  background: none;
  color: var(--text-primary);
  cursor: pointer;
  font-family: var(--font-ui);
}
input {
  font-family: var(--font-ui);
  color: var(--text-primary);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--bg-elevated);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover { background: var(--accent-blue-dim); }

/* ===== ICONS (inline SVG, offline — no emoji/system font dependency) ===== */
.icon {
  width: 1em;
  height: 1em;
  display: inline-block;
  vertical-align: -0.15em;
  flex-shrink: 0;
}
.icon-line {
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.icon.file-badge { width: 1.2em; height: 1.2em; }
.tree-icon, .tab-close { display: inline-flex; align-items: center; justify-content: center; }

/* ===== APP SHELL ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
}

/* ===== TOP BAR ===== */
#topbar {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 14px;
  background: linear-gradient(180deg, var(--bg-secondary), var(--bg-primary));
  border-bottom: 1px solid var(--border-color);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 50;
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-box {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-orange));
  box-shadow: 0 0 12px var(--accent-blue-dim);
}
.app-title {
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.3px;
}
.topbar-actions {
  display: flex;
  gap: 6px;
}
.topbar-btn {
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  font-weight: 500;
  background: var(--bg-tertiary);
  border: 1px solid transparent;
  transition: all var(--transition-fast);
}
.topbar-btn:hover {
  background: var(--accent-blue-dim);
  border-color: var(--accent-blue);
  transform: translateY(-1px);
}
.topbar-search {
  flex: 1;
  display: flex;
  justify-content: center;
}
#global-search {
  width: 100%;
  max-width: 320px;
  padding: 6px 12px;
  font-size: 12.5px;
  transition: border-color var(--transition-fast);
}
#global-search:focus {
  outline: none;
  border-color: var(--accent-orange);
  box-shadow: 0 0 0 2px var(--accent-orange-dim);
}
.topbar-right {
  display: flex;
  gap: 8px;
}
.topbar-icon-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: all var(--transition-fast);
}
.topbar-icon-btn:hover {
  background: var(--bg-tertiary);
  transform: rotate(8deg);
}

/* ===== MAIN BODY ===== */
#main-body {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* ===== ACTIVITY BAR ===== */
#activity-bar {
  width: var(--activitybar-w);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 10px;
  gap: 4px;
}
.activity-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  font-size: 17px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  position: relative;
  transition: all var(--transition-fast);
}
.activity-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}
.activity-btn.active {
  color: var(--accent-blue);
  background: var(--accent-blue-dim);
}
.activity-btn.active::before {
  content: '';
  position: absolute;
  left: -10px;
  top: 6px;
  bottom: 6px;
  width: 3px;
  background: var(--accent-blue);
  border-radius: 2px;
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width var(--transition-mid);
}
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
}
.sidebar-actions { display: flex; gap: 6px; }
.sidebar-actions button {
  width: 22px;
  height: 22px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition-fast);
}
.sidebar-actions button:hover { background: var(--bg-tertiary); }
#file-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 4px;
}

/* file tree items (used later by explorer.js) */
.tree-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  cursor: pointer;
  white-space: nowrap;
  transition: background var(--transition-fast);
}
.tree-item:hover { background: var(--bg-tertiary); }
.tree-item.selected {
  background: var(--accent-blue-dim);
  color: var(--accent-blue);
}
.tree-children {
  margin-left: 16px;
  overflow: hidden;
  transition: max-height var(--transition-mid);
}

/* ===== RESIZERS ===== */
#sidebar-resizer, #preview-resizer {
  width: 4px;
  cursor: col-resize;
  background: transparent;
  transition: background var(--transition-fast);
  z-index: 10;
}
#sidebar-resizer:hover, #preview-resizer:hover,
#sidebar-resizer.resizing, #preview-resizer.resizing {
  background: var(--accent-blue);
}

/* ===== WORKSPACE ===== */
#workspace {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-width: 0;
}
#editor-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-primary);
}
#preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
}

/* ===== TAB BAR ===== */
#tab-bar {
  display: flex;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  overflow-x: auto;
  min-height: 36px;
}
.editor-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  height: 36px;
  font-size: 12.5px;
  border-right: 1px solid var(--border-color);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  animation: tabIn var(--transition-mid);
  transition: background var(--transition-fast), color var(--transition-fast);
}
.editor-tab:hover { background: var(--bg-tertiary); }
.editor-tab.active {
  background: var(--bg-primary);
  color: var(--text-primary);
}
.editor-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent-orange);
}
.tab-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
}
.tab-dot.unsaved { background: var(--accent-orange); }
.tab-close {
  width: 16px; height: 16px;
  border-radius: 4px;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition-fast);
}
.tab-close:hover { background: var(--danger); color: #fff; }
@keyframes tabIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== EDITOR ===== */
#editor-container {
  flex: 1;
  display: flex;
  position: relative;
  overflow: hidden;
  font-family: var(--font-code);
  font-size: 14px;
  line-height: 1.6;
}
#line-numbers {
  width: 50px;
  padding: 10px 0;
  text-align: right;
  color: var(--text-muted);
  background: var(--bg-primary);
  user-select: none;
  overflow: hidden;
  border-right: 1px solid var(--border-color);
}
#line-numbers .line-num {
  padding-right: 10px;
  transition: color var(--transition-fast);
}
#line-numbers .line-num.active-line {
  color: var(--accent-orange);
  font-weight: 600;
}
#code-editor, #highlight-layer {
  position: absolute;
  top: 0; left: 50px; right: 0; bottom: 0;
  padding: 10px 14px;
  margin: 0;
  border: none;
  font-family: var(--font-code);
  font-size: 14px;
  line-height: 1.6;
  white-space: pre;
  overflow: auto;
  tab-size: 2;
}
#code-editor {
  background: transparent;
  color: transparent;
  caret-color: var(--text-primary);
  resize: none;
  z-index: 2;
  -webkit-text-fill-color: transparent;
}
#code-editor:focus { outline: none; }
#code-editor::selection {
  background: rgba(77, 159, 255, 0.40);
  color: transparent;
  -webkit-text-fill-color: transparent;
}
#code-editor::-moz-selection {
  background: rgba(77, 159, 255, 0.40);
  color: transparent;
}
body.theme-light #code-editor::selection {
  background: rgba(77, 159, 255, 0.28);
}
body.theme-light #code-editor::-moz-selection {
  background: rgba(77, 159, 255, 0.28);
}
#highlight-layer {
  background: var(--bg-primary);
  color: var(--text-primary);
  pointer-events: none;
  z-index: 1;
}
.current-line-bg {
  position: absolute;
  left: 50px; right: 0;
  background: var(--bg-tertiary);
  z-index: 0;
  pointer-events: none;
}
#minimap {
  width: 60px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  opacity: 0.6;
  overflow: hidden;
}

/* ===== PREVIEW ===== */
.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.6px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
}
.preview-header button {
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform var(--transition-fast);
}
.preview-header button:hover { transform: rotate(180deg); color: var(--accent-blue); }
#preview-frame {
  flex: 1;
  width: 100%;
  border: none;
  background: #fff;
}

/* ===== CONSOLE PANEL ===== */
#console-panel {
  height: var(--console-h);
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  transition: height var(--transition-mid);
}
#console-panel.collapsed { height: 30px; }
.console-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.6px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
}
.console-header button {
  margin-left: auto;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast);
}
.console-header button:hover { background: var(--bg-tertiary); }
.console-header #btn-toggle-console {
  margin-left: 6px;
  transition: transform var(--transition-fast);
}
#console-output {
  flex: 1;
  overflow-y: auto;
  padding: 6px 12px;
  font-family: var(--font-code);
  font-size: 12px;
}
.console-line {
  padding: 3px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  animation: fadeIn var(--transition-fast);
}
.console-line.log { color: var(--text-primary); }
.console-line.warn { color: var(--accent-orange); }
.console-line.error { color: var(--danger); }
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}

/* ===== STATUS BAR ===== */
#status-bar {
  height: var(--statusbar-h);
  background: var(--accent-blue);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  font-size: 11.5px;
}
.status-left, .status-right { display: flex; gap: 14px; }

/* ===== CONTEXT MENU ===== */
.context-menu {
  position: absolute;
  background: var(--bg-elevated);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  padding: 6px;
  min-width: 180px;
  z-index: 999;
  opacity: 0;
  transform: scale(0.95) translateY(-4px);
  transition: opacity var(--transition-fast), transform var(--transition-fast);
}
.context-menu.visible { opacity: 1; transform: scale(1) translateY(0); }
.context-menu.hidden { display: none; }
.context-menu-item {
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  cursor: pointer;
  transition: background var(--transition-fast);
}
.context-menu-item:hover { background: var(--accent-blue-dim); color: var(--accent-blue); }
.context-menu-item.danger:hover { background: rgba(255,92,92,0.15); color: var(--danger); }

/* ===== NOTIFICATIONS ===== */
#notification-container {
  position: fixed;
  bottom: 40px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 999;
}
.notification {
  background: var(--bg-elevated);
  border: 1px solid var(--border-color);
  border-left: 3px solid var(--accent-blue);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 12.5px;
  box-shadow: var(--shadow-md);
  min-width: 220px;
  animation: slideIn var(--transition-mid);
}
.notification.success { border-left-color: var(--success); }
.notification.error { border-left-color: var(--danger); }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 998;
  animation: fadeIn var(--transition-fast);
  backdrop-filter: blur(4px);
}
.modal-box {
  background: var(--bg-elevated);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 20px;
  min-width: 320px;
  animation: tabIn var(--transition-mid);
}
.modal-box h3 { margin-bottom: 12px; font-size: 14px; }
.modal-box input {
  width: 100%;
  padding: 8px 10px;
  margin-bottom: 14px;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.modal-actions button {
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  background: var(--bg-tertiary);
  transition: all var(--transition-fast);
}
.modal-actions .primary {
  background: var(--accent-blue);
  color: #fff;
}
.modal-actions button:hover { transform: translateY(-1px); filter: brightness(1.1); }

/* ===== SYNTAX HIGHLIGHT TOKENS ===== */
.tok-comment { color: var(--text-muted); font-style: italic; }
.tok-string, .tok-value { color: var(--success); }
.tok-keyword { color: var(--accent-blue); font-weight: 600; }
.tok-number { color: var(--accent-orange); }
.tok-tag { color: var(--accent-blue); font-weight: 600; }
.tok-attr, .tok-property { color: var(--accent-orange); }
.tok-selector { color: var(--accent-blue); font-weight: 600; }
.tok-punct { color: var(--text-secondary); }

/* ===== QUICK OPEN ===== */
.quick-open-list .context-menu-item { font-family: var(--font-code); }

/* ===== FIND / REPLACE BAR ===== */
.find-replace-bar {
  position: absolute;
  top: 8px;
  right: 12px;
  z-index: 30;
  background: var(--bg-elevated);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.find-row, .replace-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.find-replace-bar input {
  padding: 5px 8px;
  font-size: 12.5px;
  min-width: 160px;
}
.find-count {
  font-size: 11px;
  color: var(--text-secondary);
  min-width: 42px;
  text-align: center;
}
.find-replace-bar button {
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  background: var(--bg-tertiary);
  transition: background var(--transition-fast);
}
.find-replace-bar button:hover { background: var(--accent-blue-dim); color: var(--accent-blue); }
.find-replace-bar .replace-row button { width: auto; padding: 0 10px; font-size: 12px; }

#code-editor.wrap-on, #highlight-layer.wrap-on {
  white-space: pre-wrap;
  word-break: break-all;
}
/* word count badge in status bar */
#status-words { color: var(--text-muted); }
#status-wrap { color: var(--text-muted); transition: color var(--transition-fast); }
#status-wrap.active { color: var(--accent-orange); }
/* Go to line tooltip */
#status-cursor { cursor: pointer; }
#status-cursor:hover { color: var(--accent-blue); }
@media (max-width: 900px) {
  :root { --sidebar-w: 180px; }
  #workspace { flex-direction: column; }
  #preview-area { border-left: none; border-top: 1px solid var(--border-color); }
  .topbar-search { display: none; }
}
@media (max-width: 600px) {
  #activity-bar { display: none; }
  #sidebar { position: absolute; left: 0; top: var(--topbar-h); bottom: var(--statusbar-h); z-index: 40; box-shadow: var(--shadow-lg); }
}


/* ══════════════════ AUTH SYSTEM CSS ══════════════════ */
/* ═══════════════════════════════════════════════════════
   AUTH SYSTEM — DESIGN TOKENS (extends root palette)
═══════════════════════════════════════════════════════ */
:root {
  --auth-glass-bg: rgba(255,255,255,0.55);
  --auth-glass-border: rgba(255,255,255,0.6);
  --auth-glass-blur: 18px;
  --auth-panel-grad: linear-gradient(155deg, #1E3A8A 0%, #1D4ED8 38%, #2563EB 62%, #F97316 130%);
  --auth-input-bg: rgba(255,255,255,0.7);

  /* ── Auth shorthand tokens (dark-mode defaults) ── */
  --bg: #0A0F1E;
  --bg2: #0F172A;
  --bg3: #1E293B;
  --surface: #131929;
  --surface2: #1E293B;
  --border: #1E293B;
  --border2: #334155;
  --text: #F1F5F9;
  --text2: #CBD5E1;
  --text3: #94A3B8;
  --text4: #475569;
  --blue: #2563EB;
  --blue-mid: rgba(77,159,255,0.5);
  --green:    #4dff9d;
  --green-light: rgba(77,255,157,0.12);
  --red:      #ff5c5c;
  --red-light: rgba(255,92,92,0.12);
  --grad-blue: linear-gradient(135deg, #2563EB, #4d9fff);
  --radius:       8px;
  --radius-sm:    6px;
  --radius-xl:    18px;
  --radius-full:  999px;
  --shadow-xs:    0 1px 4px rgba(0,0,0,0.18);
  --shadow-sm:    0 2px 8px rgba(0,0,0,0.25);
  --shadow-xl:    0 12px 40px rgba(0,0,0,0.45);
  --shadow-glow-blue: 0 0 0 3px rgba(77,159,255,0.25);
  --transition:   0.18s ease;
}
[data-theme="light"] {
  --bg:       #f5f5fa;
  --bg2:      #ffffff;
  --bg3:      #ececf5;
  --surface:  #ffffff;
  --border:   #d8d8e8;
  --border2:  #c0c0d8;
  --text:     #1e1e2e;
  --text2:    #3a3a55;
  --text3:    #6b6b85;
  --text4:    #9a9ab0;
  --auth-glass-bg: rgba(255,255,255,0.80);
  --auth-glass-border: rgba(200,200,220,0.6);
  --auth-input-bg: rgba(255,255,255,0.9);
}
[data-theme="dark"] {
  --auth-glass-bg: rgba(19,25,41,0.55);
  --auth-glass-border: rgba(255,255,255,0.08);
  --auth-input-bg: rgba(15,23,42,0.55);
  --auth-panel-grad: linear-gradient(155deg, #0A0F1E 0%, #1D4ED8 45%, #2563EB 70%, #EA6D0A 135%);
}

/* ═══════════════════════════════════════════════════════
   AUTH — OVERLAY SHELL
═══════════════════════════════════════════════════════ */
#auth-view {
  position: fixed; inset: 0; z-index: 500;
  display: none;
  background: var(--bg);
  overflow-y: auto;
}
#auth-view.active { display: flex; }

.auth-shell {
  flex: 1;
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  min-height: 100vh;
}
@media (max-width: 880px) { .auth-shell { grid-template-columns: 1fr; } }

/* Illustration / brand panel */
.auth-art {
  position: relative;
  background: var(--auth-panel-grad);
  color: #fff;
  display: flex; flex-direction: column;
  padding: 44px 48px;
  overflow: hidden;
}
@media (max-width: 880px) { .auth-art { display: none; } }
.auth-art::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
  pointer-events: none;
}
.auth-art-orb {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(249,115,22,0.55), transparent 70%);
  filter: blur(10px); pointer-events: none;
  animation: authFloat 9s ease-in-out infinite;
}
.auth-art-orb.o1 { width: 280px; height: 280px; top: -80px; right: -60px; }
.auth-art-orb.o2 { width: 200px; height: 200px; bottom: -60px; left: -40px; background: radial-gradient(circle, rgba(255,255,255,0.3), transparent 70%); animation-delay: -3s; }
@keyframes authFloat { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(14px,-18px); } }

.auth-art-top { position: relative; z-index: 1; display: flex; align-items: center; gap: 9px; }
.auth-art-logo-mark { width: 34px; height: 34px; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
.auth-art-logo-mark svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.auth-art-logo-text { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.03em; }

.auth-art-mid { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 18px; max-width: 420px; }
.auth-art-mid h2 { font-size: 1.85rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.25; }
.auth-art-mid p { font-size: 0.92rem; opacity: 0.82; line-height: 1.6; }

.auth-illustration { position: relative; width: 100%; max-width: 360px; margin-top: 6px; }
.auth-illustration svg { width: 100%; height: auto; display: block; filter: drop-shadow(0 16px 30px rgba(0,0,0,0.25)); }

.auth-art-bottom { position: relative; z-index: 1; display: flex; gap: 26px; }
.auth-art-stat b { display: block; font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
.auth-art-stat span { font-size: 0.72rem; opacity: 0.75; }

/* Form panel */
.auth-panel {
  display: flex; align-items: center; justify-content: center;
  padding: 40px 24px;
  position: relative;
}
.auth-card {
  width: 100%; max-width: 400px;
  background: var(--auth-glass-bg);
  border: 1px solid var(--auth-glass-border);
  backdrop-filter: blur(var(--auth-glass-blur));
  -webkit-backdrop-filter: blur(var(--auth-glass-blur));
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  padding: 36px 34px 30px;
  animation: fadeSlideUp 0.35s cubic-bezier(0.4,0,0.2,1);
}
.auth-card-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.auth-back-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 0.78rem; font-weight: 600;
  padding: 4px 0; transition: color var(--transition);
}
.auth-back-btn:hover { color: var(--blue); }
.auth-back-btn svg { width: 14px; height: 14px; }
[dir="rtl"] .auth-back-btn svg { transform: scaleX(-1); }

.auth-card-header { margin-bottom: 24px; }
.auth-card-icon {
  width: 44px; height: 44px; border-radius: var(--radius-md);
  background: var(--grad-blue); display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px; box-shadow: 0 4px 14px rgba(37,99,235,0.35);
  font-size: 1.2rem; color: #fff;
}
.auth-card-title { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); margin-bottom: 5px; }
.auth-card-sub { font-size: 0.84rem; color: var(--text3); line-height: 1.5; }
.auth-card-sub b { color: var(--text2); font-weight: 600; }

/* Inputs */
.auth-form { display: flex; flex-direction: column; gap: 15px; }
.auth-field { display: flex; flex-direction: column; gap: 6px; }
.auth-label { font-size: 0.78rem; font-weight: 600; color: var(--text2); display: flex; justify-content: space-between; align-items: center; }
.auth-label a, .auth-link-sm { font-size: 0.76rem; font-weight: 600; color: var(--blue); cursor: pointer; text-decoration: none; }
.auth-label a:hover, .auth-link-sm:hover { text-decoration: underline; }

.auth-input-wrap { position: relative; display: flex; align-items: center; }
.auth-input-wrap svg.auth-input-icon { position: absolute; left: 13px; width: 16px; height: 16px; color: var(--text4); pointer-events: none; transition: color var(--transition); }
[dir="rtl"] .auth-input-wrap svg.auth-input-icon { left: auto; right: 13px; }
.auth-input {
  width: 100%;
  background: var(--auth-input-bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px 11px 38px;
  font-size: 0.88rem; color: var(--text);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
}
[dir="rtl"] .auth-input { padding: 11px 38px 11px 14px; }
.auth-input::placeholder { color: var(--text4); }
.auth-input:focus { border-color: var(--blue); box-shadow: var(--shadow-glow-blue); background: var(--surface); }
.auth-input.has-error { border-color: var(--red); }
.auth-input.has-error:focus { box-shadow: 0 0 0 3px rgba(239,68,68,0.15); }
.auth-input.has-success { border-color: var(--green); }
.auth-input-wrap .pwd-toggle {
  position: absolute; right: 11px; background: none; border: none; cursor: pointer;
  color: var(--text4); display: flex; align-items: center; padding: 4px; border-radius: 4px;
  transition: color var(--transition);
}
[dir="rtl"] .auth-input-wrap .pwd-toggle { right: auto; left: 11px; }
.auth-input-wrap .pwd-toggle:hover { color: var(--text2); }
.auth-input-wrap .pwd-toggle svg { width: 16px; height: 16px; }

.auth-error-msg { font-size: 0.72rem; color: var(--red); display: none; align-items: center; gap: 4px; margin-top: 2px; }
.auth-error-msg.visible { display: flex; }
.auth-error-msg svg { width: 12px; height: 12px; flex-shrink: 0; }

/* Identifier tabs (email/username) */
.auth-tabs { display: flex; gap: 4px; background: var(--bg2); padding: 3px; border-radius: var(--radius); margin-bottom: 4px; }
.auth-tab { flex: 1; text-align: center; padding: 7px 0; border-radius: var(--radius-sm); font-size: 0.76rem; font-weight: 600; color: var(--text3); cursor: pointer; border: none; background: none; transition: all var(--transition); }
.auth-tab.active { background: var(--surface); color: var(--blue); box-shadow: var(--shadow-xs); }

/* Checkbox row */
.auth-row-between { display: flex; align-items: center; justify-content: space-between; font-size: 0.78rem; }
.auth-checkbox-line { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; color: var(--text2); font-size: 0.78rem; }
.auth-checkbox-line input { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; flex-shrink: 0; }

/* Password strength meter */
.pwd-meter { display: flex; gap: 4px; margin-top: 2px; }
.pwd-meter-seg { height: 4px; flex: 1; border-radius: 3px; background: var(--bg3); transition: background var(--transition); }
.pwd-meter.s1 .pwd-meter-seg:nth-child(1) { background: var(--red); }
.pwd-meter.s2 .pwd-meter-seg:nth-child(-n+2) { background: var(--orange); }
.pwd-meter.s3 .pwd-meter-seg:nth-child(-n+3) { background: #EAB308; }
.pwd-meter.s4 .pwd-meter-seg:nth-child(-n+4) { background: var(--green); }
.pwd-meter-label { font-size: 0.7rem; font-weight: 600; margin-top: 4px; color: var(--text3); }
.pwd-meter-label.s1 { color: var(--red); } .pwd-meter-label.s2 { color: var(--orange); }
.pwd-meter-label.s3 { color: #CA8A04; } .pwd-meter-label.s4 { color: var(--green); }

.pwd-requirements { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius-sm); }
.pwd-req-item { display: flex; align-items: center; gap: 6px; font-size: 0.71rem; color: var(--text4); transition: color var(--transition); }
.pwd-req-item.met { color: var(--green); }
.pwd-req-item .req-dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid currentColor; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.6rem; }
.pwd-req-item.met .req-dot { background: var(--green); border-color: var(--green); color: #fff; }

/* Buttons */
.auth-btn-primary {
  width: 100%; padding: 12px; border: none; border-radius: var(--radius);
  background: var(--grad-blue); color: #fff; font-size: 0.88rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 14px rgba(37,99,235,0.32);
  transition: all var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 4px;
}
.auth-btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(37,99,235,0.45); }
.auth-btn-primary:active:not(:disabled) { transform: translateY(0); }
.auth-btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.auth-btn-primary.orange { background: var(--grad-orange); box-shadow: 0 4px 14px rgba(249,115,22,0.32); }

.auth-spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.auth-btn-primary.loading .auth-spinner { display: inline-block; }
.auth-btn-primary.loading .btn-label-text { opacity: 0.85; }
@keyframes spin { to { transform: rotate(360deg); } }

.auth-divider { display: flex; align-items: center; gap: 10px; margin: 18px 0 14px; }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.auth-divider span { font-size: 0.72rem; color: var(--text4); font-weight: 500; white-space: nowrap; }

.auth-social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.auth-social-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 9px 10px; border-radius: var(--radius); border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text2); font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
}
.auth-social-btn:hover { border-color: var(--border2); background: var(--bg2); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.auth-social-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

.auth-footer-text { text-align: center; font-size: 0.81rem; color: var(--text3); margin-top: 20px; }
.auth-footer-text a, .auth-footer-text span.lnk { color: var(--blue); font-weight: 600; cursor: pointer; }
.auth-footer-text a:hover, .auth-footer-text span.lnk:hover { text-decoration: underline; }

.auth-lang-theme-switch { display: flex; gap: 8px; align-items: center; }

/* Floating top-right controls inside auth view (lang/theme) */
.auth-floating-controls {
  position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; z-index: 2;
}
[dir="rtl"] .auth-floating-controls { right: auto; left: 20px; }
.auth-floating-controls .lang-btn, .auth-floating-controls .icon-btn { background: var(--surface); box-shadow: var(--shadow-sm); }

/* Terms checkbox block */
.auth-terms-line { font-size: 0.75rem; line-height: 1.5; color: var(--text3); }
.auth-terms-line a { color: var(--blue); font-weight: 600; cursor: pointer; }

/* Captcha (simulated math challenge — swap for hCaptcha/reCAPTCHA site-key in production) */
.auth-captcha { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--bg2); }
.auth-captcha-q { font-size: 0.85rem; font-weight: 700; color: var(--text); flex-shrink: 0; letter-spacing: 0.02em; }
.auth-captcha input { width: 60px; text-align: center; padding: 7px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); font-size: 0.85rem; font-weight: 600; color: var(--text); outline: none; }
.auth-captcha input:focus { border-color: var(--blue); }
.auth-captcha-refresh { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text4); display: flex; padding: 4px; border-radius: 4px; }
[dir="rtl"] .auth-captcha-refresh { margin-left: 0; margin-right: auto; }
.auth-captcha-refresh:hover { color: var(--blue); background: var(--bg3); }
.auth-captcha-refresh svg { width: 15px; height: 15px; }
.auth-captcha-ok { color: var(--green); display: flex; align-items: center; }
.auth-captcha-ok svg { width: 16px; height: 16px; }

/* OTP boxes (2FA / verify email) */
.otp-boxes { display: flex; gap: 9px; justify-content: center; margin: 6px 0; }
[dir="rtl"] .otp-boxes { direction: ltr; }
.otp-box {
  width: 46px; height: 54px; text-align: center; font-size: 1.3rem; font-weight: 700;
  border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--auth-input-bg);
  color: var(--text); outline: none; transition: all var(--transition);
}
.otp-box:focus { border-color: var(--blue); box-shadow: var(--shadow-glow-blue); background: var(--surface); }
.otp-box.filled { border-color: var(--blue-mid); }

.auth-resend-row { text-align: center; font-size: 0.78rem; color: var(--text3); margin-top: 6px; }
.auth-resend-row .lnk { color: var(--blue); font-weight: 700; cursor: pointer; }
.auth-resend-row .lnk.disabled { color: var(--text4); cursor: not-allowed; pointer-events: none; }

.auth-device-trust { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; background: var(--blue-light); border-radius: var(--radius); margin-top: 6px; }
.auth-device-trust svg { width: 18px; height: 18px; color: var(--blue); flex-shrink: 0; margin-top: 1px; }
.auth-device-trust p { font-size: 0.76rem; color: var(--text2); line-height: 1.45; }

/* Rate-limit / lockout banner */
.auth-banner { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: var(--radius); font-size: 0.8rem; line-height: 1.45; margin-bottom: 6px; }
.auth-banner.err { background: var(--red-light); color: #B91C1C; }
.auth-banner.warn { background: var(--orange-light); color: #C2410C; }
.auth-banner.ok { background: var(--green-light); color: #047857; }
.auth-banner svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

/* Success state (reset/verify done) */
.auth-success-icon {
  width: 64px; height: 64px; border-radius: 50%; background: var(--green-light); color: var(--green);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 1.8rem;
  animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes bounceIn { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* ═══════════════════════════════════════════════════════
   USER MENU (header)
═══════════════════════════════════════════════════════ */
.user-menu-wrap { position: relative; flex-shrink: 0; }
.user-avatar-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; padding: 0;
  background: var(--grad-orange); color: #fff; font-size: 0.78rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  box-shadow: 0 0 0 2px var(--surface), 0 0 0 3.5px var(--blue-mid);
  transition: box-shadow var(--transition);
}
.user-avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
.user-avatar-btn:hover { box-shadow: 0 0 0 2px var(--surface), 0 0 0 3.5px var(--blue); }

.user-dropdown {
  position: absolute; top: calc(100% + 10px); right: 0; width: 230px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
  box-shadow: var(--shadow-xl); padding: 8px; z-index: 250;
  display: none; flex-direction: column; gap: 1px;
  animation: fadeSlideUp 0.18s ease;
}
[dir="rtl"] .user-dropdown { right: auto; left: 0; }
.user-dropdown.open { display: flex; }
.user-dropdown-head { display: flex; align-items: center; gap: 10px; padding: 8px 10px 12px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
.user-dropdown-head .uda { width: 38px; height: 38px; border-radius: 50%; background: var(--grad-orange); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; overflow: hidden; flex-shrink: 0; }
.user-dropdown-head .uda img { width: 100%; height: 100%; object-fit: cover; }
.user-dropdown-head .udn { font-size: 0.85rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-dropdown-head .ude { font-size: 0.72rem; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-dropdown-item {
  display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius-sm);
  font-size: 0.81rem; font-weight: 500; color: var(--text2); cursor: pointer; background: none; border: none; width: 100%; text-align: left;
  transition: background var(--transition);
}
[dir="rtl"] .user-dropdown-item { text-align: right; }
.user-dropdown-item:hover { background: var(--bg2); }
.user-dropdown-item svg { width: 15px; height: 15px; color: var(--text3); flex-shrink: 0; }
.user-dropdown-item.danger { color: var(--red); }
.user-dropdown-item.danger svg { color: var(--red); }
.user-dropdown-sep { height: 1px; background: var(--border); margin: 5px 2px; }

/* ═══════════════════════════════════════════════════════
   PROFILE PAGE (within app, not the overlay)
═══════════════════════════════════════════════════════ */
#profile-view { flex: 1; overflow-y: auto; padding: 28px; background: var(--bg); display: none; }
#profile-view.active { display: block; }
.profile-wrap { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
.profile-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); margin-bottom: 2px; }
.profile-sub { font-size: 0.85rem; color: var(--text3); margin-bottom: 6px; }

.profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-xs); padding: 24px; }
.profile-card h3 { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.profile-card .pc-sub { font-size: 0.78rem; color: var(--text3); margin-bottom: 18px; }

.avatar-row { display: flex; align-items: center; gap: 18px; margin-bottom: 6px; }

<!-- SCRIPTS -->
<script>
  const App = (() => {
  const state = {
    project: {
      name: 'Untitled Project',
      files: {},
      tree: { id: 'root', type: 'folder', name: 'root', children: [] }
    },
    openTabs: [],
    activeTabId: null,
    settings: null,
    nextId: 1
  };

  function genId() {
    return 'n' + (state.nextId++);
  }

  function init() {
    Theme.init();
    Settings.init(state);
    Storage.init(state);

    const restored = Storage.loadProject();
    if (restored) {
      state.project = restored.project;
      state.openTabs = restored.openTabs || [];
      state.activeTabId = restored.activeTabId || null;
      state.nextId = restored.nextId || 1;
    } else {
      seedDefaultProject();
    }

    Explorer.init(state);
    Editor.init(state);
    Preview.init(state);
    Download.init(state);
    UI.init(state);

    Explorer.render();
    Editor.renderTabs();

    if (state.activeTabId) {
      Editor.openTab(state.activeTabId, true);
    } else if (state.openTabs.length) {
      Editor.openTab(state.openTabs[0].id, true);
    }

    Preview.update();
    bindGlobalShortcuts();
    autoSaveLoop();
  }

  function seedDefaultProject() {
    const htmlId = genId();
    const cssId = genId();
    const jsId = genId();

    state.project.files[htmlId] = {
      id: htmlId, name: 'index.html', language: 'html',
      content: '<!DOCTYPE html>\n<html>\n<head>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>Hello, MyStudio!</h1>\n  <script src="script.js"><' + '/script>\n</body>\n</html>\n'
    };
    state.project.files[cssId] = {
      id: cssId, name: 'style.css', language: 'css',
      content: 'body {\n  font-family: sans-serif;\n  background: #1e1e2e;\n  color: #eee;\n  padding: 40px;\n}\n'
    };
    state.project.files[jsId] = {
      id: jsId, name: 'script.js', language: 'javascript',
      content: 'console.log("MyStudio is running");\n'
    };

    state.project.tree.children = [
      { id: htmlId, type: 'file', name: 'index.html' },
      { id: cssId, type: 'file', name: 'style.css' },
      { id: jsId, type: 'file', name: 'script.js' }
    ];

    state.openTabs = [
      { id: htmlId, name: 'index.html', dirty: false }
    ];
    state.activeTabId = htmlId;
  }

  function bindGlobalShortcuts() {
    document.addEventListener('keydown', (e) => {
      const ctrl = e.ctrlKey || e.metaKey;
      if (ctrl && e.key.toLowerCase() === 's') {
        e.preventDefault();
        Storage.saveProject();
        // Mark all tabs as saved
        state.openTabs.forEach(t => { t.dirty = false; });
        Editor.renderTabs();
        UI.notify('Project saved', 'success');
      } else if (ctrl && e.key.toLowerCase() === 'z' && !e.shiftKey) {
        // Let browser handle undo in textarea natively; also handle custom
        // Note: Editor has its own undo for content
      } else if (ctrl && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) {
        // Redo handled by browser in textarea
      } else if (ctrl && e.key.toLowerCase() === 'n') {
        e.preventDefault();
        UI.openModal('new-file');
      } else if (ctrl && e.key.toLowerCase() === 'o') {
        e.preventDefault();
        Storage.triggerImport();
      } else if (ctrl && e.key.toLowerCase() === 'p') {
        e.preventDefault();
        UI.openQuickOpen();
      } else if (ctrl && e.key.toLowerCase() === 'f') {
        e.preventDefault();
        Editor.openFind();
      } else if (ctrl && e.key.toLowerCase() === 'h') {
        e.preventDefault();
        Editor.openReplace();
      } else if (ctrl && e.key === '/') {
        e.preventDefault();
        Editor.toggleComment();
      } else if (ctrl && e.key.toLowerCase() === 'd') {
        e.preventDefault();
        Editor.duplicateLine();
      } else if (e.altKey && e.key === 'ArrowUp') {
        e.preventDefault();
        Editor.moveLine(-1);
      } else if (e.altKey && e.key === 'ArrowDown') {
        e.preventDefault();
        Editor.moveLine(1);
      } else if (ctrl && e.key.toLowerCase() === 'g') {
        e.preventDefault();
        Editor.promptGoToLine();
      } else if (ctrl && e.shiftKey && e.key.toLowerCase() === 'f') {
        e.preventDefault();
        Editor.formatCode();
      } else if (e.key === 'F2') {
        e.preventDefault();
        Explorer.renameSelected();
      }
    });
  }

  let autoSaveTimer = null;
  function autoSaveLoop() {
    clearInterval(autoSaveTimer);
    autoSaveTimer = setInterval(() => {
      if (state.settings && state.settings.autoSave) {
        Storage.saveProject();
      }
    }, 5000);
  }

  function newProject() {
    state.project = {
      name: 'Untitled Project',
      files: {},
      tree: { id: 'root', type: 'folder', name: 'root', children: [] }
    };
    state.openTabs = [];
    state.activeTabId = null;
    state.nextId = 1;

    seedDefaultProject();

    Explorer.render();
    Editor.renderTabs();
    if (state.activeTabId) Editor.openTab(state.activeTabId, true);
    Preview.update();
    Storage.saveProject();
    UI.notify('New project created', 'success');
  }

  function getState() {
    return state;
  }

  return { init, getState, genId, newProject };
})();

document.addEventListener('DOMContentLoaded', App.init);
const Explorer = (() => {
  let state = null;
  let selectedId = null;
  const collapsed = new Set();

  function init(appState) {
    state = appState;
    bindToolbarButtons();
    bindContextMenu();
  }

  function bindToolbarButtons() {
    document.getElementById('btn-new-file').addEventListener('click', () => {
      createEntry('file');
    });
    document.getElementById('btn-new-folder').addEventListener('click', () => {
      createEntry('folder');
    });
  }

  function findNode(nodeId, node = state.project.tree) {
    if (node.id === nodeId) return node;
    if (node.children) {
      for (const child of node.children) {
        const found = findNode(nodeId, child);
        if (found) return found;
      }
    }
    return null;
  }

  function findParent(nodeId, node = state.project.tree) {
    if (node.children) {
      for (const child of node.children) {
        if (child.id === nodeId) return node;
        const found = findParent(nodeId, child);
        if (found) return found;
      }
    }
    return null;
  }

  function getTargetFolder() {
    if (!selectedId) return state.project.tree;
    const node = findNode(selectedId);
    if (!node) return state.project.tree;
    return node.type === 'folder' ? node : findParent(selectedId);
  }

  function createEntry(type, parentOverride, nameOverride) {
    const parent = parentOverride || getTargetFolder();
    const baseName = nameOverride || (type === 'folder' ? 'New Folder' : 'untitled.txt');
    const id = App.genId();

    if (type === 'file') {
      state.project.files[id] = {
        id, name: baseName, language: Utils.detectLanguage(baseName), content: ''
      };
      parent.children.push({ id, type: 'file', name: baseName });
    } else {
      parent.children.push({ id, type: 'folder', name: baseName, children: [] });
    }

    render();
    selectedId = id;
    if (!nameOverride) startInlineRename(id);
    return id;
  }

  function deleteEntry(nodeId) {
    const parent = findParent(nodeId) || state.project.tree;
    const node = findNode(nodeId);
    if (!node) return;

    collectFileIds(node).forEach(fid => delete state.project.files[fid]);
    parent.children = parent.children.filter(c => c.id !== nodeId);

    state.openTabs = state.openTabs.filter(t => state.project.files[t.id]);
    if (!state.project.files[state.activeTabId]) {
      state.activeTabId = state.openTabs.length ? state.openTabs[0].id : null;
      Editor.openTab(state.activeTabId, true);
    }

    render();
    Editor.renderTabs();
    UI.notify(`Deleted "${node.name}"`, 'success');
  }

  function collectFileIds(node, acc = []) {
    if (node.type === 'file') acc.push(node.id);
    if (node.children) node.children.forEach(c => collectFileIds(c, acc));
    return acc;
  }

  function renameEntry(nodeId, newName) {
    if (!newName || !newName.trim()) return;
    const node = findNode(nodeId);
    if (!node) return;
    node.name = newName.trim();
    if (node.type === 'file' && state.project.files[nodeId]) {
      state.project.files[nodeId].name = node.name;
      state.project.files[nodeId].language = Utils.detectLanguage(node.name);
      Editor.refreshTabName(nodeId, node.name);
    }
    render();
  }

  function renameSelected() {
    if (selectedId) startInlineRename(selectedId);
  }

  function startInlineRename(nodeId) {
    const el = document.querySelector(`.tree-item[data-id="${nodeId}"] .tree-label`);
    if (!el) return;
    const original = el.textContent;
    el.setAttribute('contenteditable', 'true');
    el.focus();
    document.execCommand('selectAll', false, null);

    const finish = () => {
      el.removeAttribute('contenteditable');
      renameEntry(nodeId, el.textContent.trim() || original);
      el.removeEventListener('blur', finish);
      el.removeEventListener('keydown', onKey);
    };
    const onKey = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }

    });
  }

  function goToLine(lineNum) {
    const lines = textarea.value.split('\n');
    let pos = 0;
    for (let i = 0; i < lineNum - 1 && i < lines.length; i++) pos += lines[i].length + 1;
    textarea.focus();
    textarea.setSelectionRange(pos, pos);
    updateStatusBar();
  }

  return {
    init, openTab, closeTab, renderTabs, refreshTabName, markSaved,
    undo, redo, duplicateLine, moveLine, toggleComment,
    openFind, openReplace, goToLine, getActiveTab,
    toggleWordWrap, formatCode, promptGoToLine, exportCurrentFile
  };
})();

/* ===================================================================== */
/*  UTILS                                                                 */
/* ===================================================================== */
const Utils = (() => {
  const LANGUAGE_MAP = {
    html: 'html', htm: 'html',
    css: 'css',
    js: 'javascript', mjs: 'javascript',
    json: 'json',
    md: 'markdown',
    txt: 'plaintext'
  };
  const ICON_MAP = {
    html: '🌐', htm: '🌐',
    css: '🎨',
    js: '📜', mjs: '📜',
    json: '🧾',
    md: '📝',
    txt: '📄'
  };
  const LABEL_MAP = {
    html: 'HTML', css: 'CSS', javascript: 'JavaScript',
    json: 'JSON', markdown: 'Markdown', plaintext: 'Plain Text'
  };

  function getExt(name) {
    const idx = name.lastIndexOf('.');
    return idx === -1 ? '' : name.slice(idx + 1).toLowerCase();
  }

  function detectLanguage(name) {
    return LANGUAGE_MAP[getExt(name)] || 'plaintext';
  }

  function fileIcon(name) {
    return ICON_MAP[getExt(name)] || '📄';
  }

  function languageLabel(lang) {
    return LABEL_MAP[lang] || 'Plain Text';
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function debounce(fn, delay) {
    let timer = null;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), delay);
    };
  }

  function downloadBlob(filename, content, type) {
    const blob = new Blob([content], { type: type || 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  return { detectLanguage, fileIcon, languageLabel, escapeHtml, debounce, downloadBlob };
})();

/* ===================================================================== */
/*  HIGHLIGHT (lightweight regex-based syntax highlighter)               */
/* ===================================================================== */
const Highlight = (() => {
  const RULES = {
    javascript: [
      { type: 'comment', re: /\/\/.*|\/\*[\s\S]*?\*\// },
      { type: 'string', re: /`(?:\\.|[^`\\])*`|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'/ },
      { type: 'number', re: /\b\d+(?:\.\d+)?\b/ },
      { type: 'keyword', re: /\b(?:const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|class|extends|new|this|typeof|instanceof|try|catch|finally|throw|async|await|import|export|default|from|of|in|null|undefined|true|false|delete|void|yield|static|get|set|super)\b/ },
      { type: 'property', re: /\b[A-Za-z_$][\w$]*(?=\s*\()/ }
    ],
    json: [
      { type: 'property', re: /"(?:\\.|[^"\\])*"(?=\s*:)/ },
      { type: 'value', re: /"(?:\\.|[^"\\])*"/ },
      { type: 'number', re: /\b-?\d+(?:\.\d+)?\b/ },
      { type: 'keyword', re: /\b(?:true|false|null)\b/ }
    ],
    css: [
      { type: 'comment', re: /\/\*[\s\S]*?\*\// },
      { type: 'string', re: /"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'/ },
      { type: 'selector', re: /[.#]?[A-Za-z][\w-]*(?=\s*\{)/ },
      { type: 'property', re: /[A-Za-z-]+(?=\s*:)/ },
      { type: 'value', re: /#[0-9a-fA-F]{3,8}\b/ },
      { type: 'number', re: /\b\d+(?:\.\d+)?(?:px|em|rem|%|s|ms|vh|vw)?\b/ }
    ],
    html: [
      { type: 'comment', re: /<!--[\s\S]*?-->/ },
      { type: 'tag', re: /<\/?[A-Za-z][\w-]*/ },
      { type: 'attr', re: /[A-Za-z-]+(?==)/ },
      { type: 'string', re: /"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'/ },
      { type: 'punct', re: /\/?>/ }
    ]
  };

  const regexCache = {};

  function buildRegex(lang) {
    const rules = RULES[lang];
    if (!rules) return null;
    return new RegExp(rules.map(r => '(' + r.re.source + ')').join('|'), 'g');
  }

  function getRegex(lang) {
    if (!(lang in regexCache)) regexCache[lang] = buildRegex(lang);
    return regexCache[lang];
  }

  function tokenize(code, lang) {
    const rules = RULES[lang];
    const regex = getRegex(lang);
    if (!rules || !regex) return Utils.escapeHtml(code);

    let result = '';
    let lastIndex = 0;
    let match;
    regex.lastIndex = 0;
    while ((match = regex.exec(code))) {
      if (match.index > lastIndex) {
        result += Utils.escapeHtml(code.slice(lastIndex, match.index));
      }
      const groupIdx = match.slice(1).findIndex(g => g !== undefined);
      const type = rules[groupIdx] ? rules[groupIdx].type : 'text';
      result += `<span class="tok-${type}">${Utils.escapeHtml(match[0])}</span>`;
      lastIndex = match.index + match[0].length;
      if (match[0].length === 0) regex.lastIndex++;
    }
    result += Utils.escapeHtml(code.slice(lastIndex));
    return result;
  }

  return { tokenize };
})();

/*  THEME                                                                 */
/* ===================================================================== */
const Theme = (() => {
  const KEY = 'mystudio_theme';

  function init() {
    const saved = localStorage.getItem(KEY) || 'dark';
    apply(saved);
    const btn = document.getElementById('btn-theme-toggle');
    if (btn) btn.addEventListener('click', toggle);
  }

  function apply(theme) {
    document.body.classList.remove('theme-dark', 'theme-light');
    document.body.classList.add(theme === 'light' ? 'theme-light' : 'theme-dark');
    localStorage.setItem(KEY, theme);
  }

  function toggle() {
    const isLight = document.body.classList.contains('theme-light');
    apply(isLight ? 'dark' : 'light');
  }

  function current() {
    return document.body.classList.contains('theme-light') ? 'light' : 'dark';
  }

  return { init, toggle, current };
})();

/*  SETTINGS                                                              */
/* ===================================================================== */
const Settings = (() => {
  const KEY = 'mystudio_settings';
  const DEFAULTS = { autoSave: true, fontSize: 14, tabSize: 2 };
  let state = null;

  function init(appState) {
    state = appState;
    state.settings = Object.assign({}, DEFAULTS, load());
    apply();
    const btn = document.getElementById('btn-settings');
    if (btn) btn.addEventListener('click', () => UI.openModal('settings'));
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state.settings)); } catch (e) {}
  }

  function apply() {
    const editor = document.getElementById('code-editor');
    const highlightLayer = document.getElementById('highlight-layer');
    const lineNumbers = document.getElementById('line-numbers');
    const fontSize = state.settings.fontSize + 'px';

    if (editor) { editor.style.fontSize = fontSize; editor.style.tabSize = state.settings.tabSize; }
    if (highlightLayer) { highlightLayer.style.fontSize = fontSize; highlightLayer.style.tabSize = state.settings.tabSize; }
    if (lineNumbers) lineNumbers.style.fontSize = fontSize;

    const indentEl = document.getElementById('status-indent');
    if (indentEl) indentEl.textContent = 'Spaces: ' + state.settings.tabSize;
  }

  function renderModal(box) {
    box.innerHTML = `
      <h3>Settings</h3>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12.5px;">
        <input type="checkbox" id="set-autosave" style="width:auto;margin:0;" ${state.settings.autoSave ? 'checked' : ''}>
        Auto Save (every 5s)
      </label>
      <label style="display:block;margin-bottom:6px;font-size:12.5px;color:var(--text-secondary)">Font Size (px)</label>
      <input type="number" id="set-fontsize" min="10" max="24" value="${state.settings.fontSize}">
      <label style="display:block;margin-bottom:6px;font-size:12.5px;color:var(--text-secondary)">Tab Size (spaces)</label>
      <input type="number" id="set-tabsize" min="1" max="8" value="${state.settings.tabSize}">
      <div class="modal-actions">
        <button class="primary modal-close">Done</button>
      </div>`;

    box.querySelector('#set-autosave').addEventListener('change', (e) => {
      state.settings.autoSave = e.target.checked;
      save();
    });
    box.querySelector('#set-fontsize').addEventListener('change', (e) => {
      state.settings.fontSize = parseInt(e.target.value, 10) || DEFAULTS.fontSize;
      save();
      apply();
    });
    box.querySelector('#set-tabsize').addEventListener('change', (e) => {
      state.settings.tabSize = parseInt(e.target.value, 10) || DEFAULTS.tabSize;
      save();
      apply();
    });
    box.querySelector('.modal-close').addEventListener('click', UI.closeModal);
  }

  return { init, save, apply, renderModal };
})();

/* ===================================================================== */
/*  STORAGE                                                               */
/* ===================================================================== */
const Storage = (() => {
  const KEY = 'mystudio_project';
  let state = null;
  let fileInput = null;

  function init(appState) {
    state = appState;
    buildFileInput();
  }

  function buildFileInput() {
    fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.json,.mystudio.json';
    fileInput.style.display = 'none';
    fileInput.addEventListener('change', handleFileSelected);
    document.body.appendChild(fileInput);
  }

  function handleFileSelected(e) {
    const file = e.target.files[0];
    fileInput.value = '';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        importProject(JSON.parse(reader.result));
      } catch (err) {
        UI.notify('Failed to open project: invalid file', 'error');
      }
    };
    reader.onerror = () => UI.notify('Failed to read file', 'error');
    reader.readAsText(file);
  }

  function importProject(data) {
    if (!data || !data.project) {
      UI.notify('Invalid project file', 'error');
      return;
    }
    state.project = data.project;
    state.openTabs = data.openTabs || [];
    state.activeTabId = data.activeTabId || null;
    state.nextId = data.nextId || 1;

    Explorer.render();
    Editor.renderTabs();
    if (state.openTabs.length) {
      Editor.openTab(state.openTabs[0].id, true);
    } else {
      Editor.openTab(null, true);
    }
    Preview.update();
    saveProject();
    UI.notify('Project opened', 'success');
  }

  function serialize() {
    return JSON.stringify({
      project: state.project,
      openTabs: state.openTabs,
      activeTabId: state.activeTabId,
      nextId: state.nextId
    });
  }

  function saveProject() {
    try {
      localStorage.setItem(KEY, serialize());
    } catch (e) {
      if (typeof UI !== 'undefined') UI.notify('Could not save project (storage full?)', 'error');
    }
  }

  function loadProject() {
    try {
      const raw = localStorage.getItem(KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function triggerImport() {
    if (fileInput) fileInput.click();
  }

  function exportData() {
    return serialize();
  }

  return { init, saveProject, loadProject, triggerImport, importProject, exportData };
})();

/* ===================================================================== */
/*  PREVIEW                                                               */
/* ===================================================================== */
const Preview = (() => {
  let state = null;
  let frame = null;
  let debouncedUpdate = null;

  function init(appState) {
    state = appState;
    frame = document.getElementById('preview-frame');
    debouncedUpdate = Utils.debounce(update, 400);
    const btn = document.getElementById('btn-refresh-preview');
    if (btn) btn.addEventListener('click', update);
    const btnNew = document.getElementById('btn-preview-newtab');
    if (btnNew) btnNew.addEventListener('click', () => {
      const doc = buildDocument();
      const blob = new Blob([doc], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    });
    window.addEventListener('message', onMessage);
  }

  function onMessage(e) {
    if (!e.data || e.data.source !== 'mystudio-preview') return;
    UI.logToConsole(e.data.level, e.data.args);
  }

  function findFileByName(href) {
    const clean = href.replace(/^\.?\//, '').split(/[?#]/)[0];
    return Object.values(state.project.files).find(f => f.name === clean || f.name === href);
  }

  function findMainHtml() {
    const tab = Editor.getActiveTab();
    if (tab) {
      const file = state.project.files[tab.id];
      if (file && file.language === 'html') return file;
    }
    const byName = Object.values(state.project.files).find(f => f.name === 'index.html');
    if (byName) return byName;
    return Object.values(state.project.files).find(f => f.language === 'html');
  }

  function buildDocument() {
    const mainFile = findMainHtml();
    if (!mainFile) {
      return '<!DOCTYPE html><html><body style="font-family:sans-serif;color:#888;padding:40px;">No HTML file to preview</body></html>';
    }

    let html = mainFile.content;

    html = html.replace(/<link[^>]+href=["']([^"']+)["'][^>]*>/gi, (match, href) => {
      if (!/\.css(?:$|[?#])/i.test(href)) return match;
      const file = findFileByName(href);
      return file ? `<style>\n${file.content}\n</style>` : match;
    });

    html = html.replace(/<script[^>]+src=["']([^"']+)["'][^>]*>\s*<\/script>/gi, (match, src) => {
      const file = findFileByName(src);
      return file ? '<' + 'script>\n' + file.content + '\n<' + '/script>' : match;
    });

    const bootstrap = '<' + 'script>(function(){' +
      'function send(level,args){try{parent.postMessage({source:"mystudio-preview",level:level,args:args.map(function(a){' +
      'try{return typeof a==="string"?a:JSON.stringify(a);}catch(e){return String(a);}' +
      '})}, "*");}catch(e){}}' +
      '["log","warn","error","info"].forEach(function(level){' +
      'var original=console[level];' +
      'console[level]=function(){send(level,Array.prototype.slice.call(arguments));original.apply(console,arguments);};' +
      '});' +
      'window.addEventListener("error",function(e){send("error",[e.message+" ("+e.filename+":"+e.lineno+")"]);});' +
      '})();<' + '/script>';

    if (/<head[^>]*>/i.test(html)) {
      html = html.replace(/<head[^>]*>/i, (m) => m + bootstrap);
    } else if (/<html[^>]*>/i.test(html)) {
      html = html.replace(/<html[^>]*>/i, (m) => m + bootstrap);
    } else {
      html = bootstrap + html;
    }
    return html;
  }

  function update() {
    if (!frame) return;
    frame.srcdoc = buildDocument();
  }

  function scheduleUpdate() {
    if (debouncedUpdate) debouncedUpdate();
  }

  return { init, update, scheduleUpdate };
})();

/* ===================================================================== */
/*  UI                                                                    */
/* ===================================================================== */
const UI = (() => {
  let state = null;
  let contextMenuEl = null;
  let quickOpenOverlay = null;

  const VIEW_TITLES = {
    explorer: 'EXPLORER',
    search: 'SEARCH',
    extensions: 'EXTENSIONS',
    settings: 'SETTINGS'
  };

  function init(appState) {
    state = appState;
    contextMenuEl = document.getElementById('context-menu');
    bindTopbar();
    bindActivityBar();
    bindResizers();
    bindConsole();
    bindGlobalSearch();
    bindDocumentEvents();
  }

  function bindTopbar() {
    document.getElementById('btn-new-project').addEventListener('click', () => {
      openModal('confirm', {
        title: 'New Project',
        message: 'This will replace your current project. Unsaved changes will be lost.',
        confirmLabel: 'Create New',
        onConfirm: () => App.newProject()
      });
    });
    document.getElementById('btn-open-project').addEventListener('click', () => {
      Storage.triggerImport();
    });
    document.getElementById('btn-save-project').addEventListener('click', () => {
      Storage.saveProject();
      notify('Project saved', 'success');
    });
    document.getElementById('btn-format-code').addEventListener('click', () => {
      Editor.formatCode();
    });
    document.getElementById('btn-download-file').addEventListener('click', () => {
      Editor.exportCurrentFile();
    });

    // Status bar interactions
    const cursorEl = document.getElementById('status-cursor');
    if (cursorEl) cursorEl.addEventListener('click', () => Editor.promptGoToLine());

    const wrapEl = document.getElementById('status-wrap');
    if (wrapEl) wrapEl.addEventListener('click', () => Editor.toggleWordWrap());

    const indentEl2 = document.getElementById('status-indent');
    if (indentEl2) indentEl2.addEventListener('click', () => {
      const cur = (state.settings && state.settings.tabSize) || 2;
      const next = cur === 2 ? 4 : cur === 4 ? 8 : 2;
      state.settings.tabSize = next;
      Settings.save();
      Settings.apply();
    });
  }

  function bindActivityBar() {
    document.querySelectorAll('.activity-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const view = btn.dataset.view;
        const titleEl = document.getElementById('sidebar-title');
        if (titleEl) titleEl.textContent = VIEW_TITLES[view] || 'EXPLORER';

        if (view === 'search') {
          document.getElementById('global-search').focus();
        } else if (view === 'settings') {
          openModal('settings');
        } else if (view === 'extensions') {
          notify('No extensions installed yet', 'success');
        }
      });
    });
  }

  function bindResizers() {
    makeResizer(document.getElementById('sidebar-resizer'), (dx) => {
      const sidebar = document.getElementById('sidebar');
      const newWidth = Math.min(420, Math.max(140, sidebar.getBoundingClientRect().width + dx));
      document.documentElement.style.setProperty('--sidebar-w', newWidth + 'px');
    });
    makeResizer(document.getElementById('preview-resizer'), (dx) => {
      const editorArea = document.getElementById('editor-area');
      const newWidth = Math.max(200, editorArea.getBoundingClientRect().width + dx);
      editorArea.style.flex = `0 0 ${newWidth}px`;
    });
  }

  function makeResizer(handle, onDrag) {
    if (!handle) return;
    let dragging = false;
    let lastX = 0;
    handle.addEventListener('mousedown', (e) => {
      dragging = true;
      lastX = e.clientX;
      handle.classList.add('resizing');
      document.body.style.cursor = 'col-resize';
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      lastX = e.clientX;
      onDrag(dx);
    });
    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('resizing');
      document.body.style.cursor = '';
    });
  }

  function bindConsole() {
    const panel = document.getElementById('console-panel');
    document.getElementById('btn-toggle-console').addEventListener('click', () => {
      panel.classList.toggle('collapsed');
    });
    document.getElementById('btn-clear-console').addEventListener('click', () => {
      document.getElementById('console-output').innerHTML = '';
    });
  }

  function logToConsole(level, args) {
    const output = document.getElementById('console-output');
    if (!output) return;
    const line = document.createElement('div');
    line.className = 'console-line ' + (level === 'error' ? 'error' : level === 'warn' ? 'warn' : 'log');
    line.textContent = args.join(' ');
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
  }

  function bindGlobalSearch() {
    const input = document.getElementById('global-search');
    input.addEventListener('input', () => {
      const term = input.value.trim().toLowerCase();
      document.querySelectorAll('.tree-item').forEach(item => {
        const label = item.querySelector('.tree-label');
        const match = !term || (label && label.textContent.toLowerCase().includes(term));
        item.style.display = match ? '' : 'none';
      });
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const term = input.value.trim().toLowerCase();
        const match = Object.values(state.project.files).find(f => f.name.toLowerCase().includes(term));
        if (match) Editor.openTab(match.id);
      }
    });
  }

  function bindDocumentEvents() {
    document.addEventListener('click', (e) => {
      if (contextMenuEl && !contextMenuEl.contains(e.target)) {
        hideContextMenu();
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hideContextMenu();
        closeModal();
        closeQuickOpen();
      }
    });
  }

  function notify(message, type) {
    const container = document.getElementById('notification-container');
    const el = document.createElement('div');
    el.className = 'notification' + (type ? ' ' + type : '');
    el.textContent = message;
    container.appendChild(el);
    setTimeout(() => {
      el.style.transition = 'opacity .25s ease';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 250);
    }, 2800);
  }

  function showContextMenu(x, y, items) {
    contextMenuEl.innerHTML = '';
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'context-menu-item' + (item.danger ? ' danger' : '');
      el.textContent = item.label;
      el.addEventListener('click', () => {
        hideContextMenu();
        item.action();
      });
      contextMenuEl.appendChild(el);
    });

    contextMenuEl.classList.remove('hidden');
    contextMenuEl.style.left = '0px';
    contextMenuEl.style.top = '0px';
    const rect = contextMenuEl.getBoundingClientRect();
    const maxX = window.innerWidth - rect.width - 8;
    const maxY = window.innerHeight - rect.height - 8;
    contextMenuEl.style.left = Math.min(x, Math.max(8, maxX)) + 'px';
    contextMenuEl.style.top = Math.min(y, Math.max(8, maxY)) + 'px';
    requestAnimationFrame(() => contextMenuEl.classList.add('visible'));
  }

  function hideContextMenu() {
    if (!contextMenuEl) return;
    contextMenuEl.classList.remove('visible');
    contextMenuEl.classList.add('hidden');
  }

  function openModal(type, options = {}) {
    closeModal();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const box = document.createElement('div');
    box.className = 'modal-box';
    overlay.appendChild(box);
    overlay.addEventListener('mousedown', (e) => {
      if (e.target === overlay) closeModal();
    });

    if (type === 'new-file' || type === 'new-folder') {
      const isFile = type === 'new-file';
      box.innerHTML = `
        <h3>${isFile ? 'New File' : 'New Folder'}</h3>
        <input type="text" class="modal-input" placeholder="${isFile ? 'filename.ext' : 'folder name'}">
        <div class="modal-actions">
          <button class="modal-cancel">Cancel</button>
          <button class="primary modal-confirm">Create</button>
        </div>`;
      const input = box.querySelector('.modal-input');
      const confirmCreate = () => {
        const name = input.value.trim();
        closeModal();
        if (!name) return;
        Explorer.createEntry(isFile ? 'file' : 'folder', null, name);
      };
      box.querySelector('.modal-confirm').addEventListener('click', confirmCreate);
      box.querySelector('.modal-cancel').addEventListener('click', closeModal);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmCreate(); });
      document.getElementById('modal-root').appendChild(overlay);
      input.focus();
      return;
    }

    if (type === 'confirm') {
      box.innerHTML = `
        <h3>${options.title || 'Confirm'}</h3>
        <p style="margin-bottom:14px;color:var(--text-secondary);font-size:12.5px;">${options.message || ''}</p>
        <div class="modal-actions">
          <button class="modal-cancel">Cancel</button>
          <button class="primary modal-confirm">${options.confirmLabel || 'OK'}</button>
        </div>`;
      box.querySelector('.modal-confirm').addEventListener('click', () => {
        closeModal();
        if (options.onConfirm) options.onConfirm();
      });
      box.querySelector('.modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-root').appendChild(overlay);
      return;
    }

    if (type === 'settings') {
      Settings.renderModal(box);
      document.getElementById('modal-root').appendChild(overlay);
      return;
    }
  }

  function closeModal() {
    const root = document.getElementById('modal-root');
    if (root) root.innerHTML = '';
  }

  function openQuickOpen() {
    closeQuickOpen();
    quickOpenOverlay = document.createElement('div');
    quickOpenOverlay.className = 'modal-overlay';
    const box = document.createElement('div');
    box.className = 'modal-box';
    box.style.minWidth = '360px';
    box.innerHTML = `
      <h3>Go to File</h3>
      <input type="text" class="modal-input" placeholder="Type a filename...">
      <div class="quick-open-list" style="max-height:220px;overflow-y:auto;"></div>`;
    quickOpenOverlay.appendChild(box);
    quickOpenOverlay.addEventListener('mousedown', (e) => {
      if (e.target === quickOpenOverlay) closeQuickOpen();
    });
    document.getElementById('modal-root').appendChild(quickOpenOverlay);

    const input = box.querySelector('.modal-input');
    const list = box.querySelector('.quick-open-list');

    function renderList() {
      const term = input.value.trim().toLowerCase();
      const files = Object.values(state.project.files)
        .filter(f => !term || f.name.toLowerCase().includes(term))
        .slice(0, 30);
      list.innerHTML = '';
      files.forEach(f => {
        const row = document.createElement('div');
        row.className = 'context-menu-item';
        row.textContent = f.name;
        row.addEventListener('click', () => {
          Editor.openTab(f.id);
          closeQuickOpen();
        });
        list.appendChild(row);
      });
    }

    input.addEventListener('input', renderList);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeQuickOpen();
      if (e.key === 'Enter') {
        const first = list.querySelector('.context-menu-item');
        if (first) first.click();
      }
    });
    renderList();
    input.focus();
  }

  function closeQuickOpen() {
    if (quickOpenOverlay) {
      quickOpenOverlay.remove();
      quickOpenOverlay = null;
    }
  }

  return {
    init, notify, showContextMenu, hideContextMenu,
    openModal, closeModal, openQuickOpen, closeQuickOpen, logToConsole
  };
})();
